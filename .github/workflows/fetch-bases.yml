name: Fetch official bases PDF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p paperwork
      - name: Download bases convocatoria 2026
        run: |
          curl -sL --max-time 60 \
            "https://sede.valencia.es/sede/descarga/doc/DOCUMENT_1_20260010001722" \
            -o paperwork/00-bases-convocatoria.pdf
          file paperwork/00-bases-convocatoria.pdf
          ls -lh paperwork/00-bases-convocatoria.pdf
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add paperwork/00-bases-convocatoria.pdf
          git diff --staged --quiet || (git commit -m "paperwork: download official bases PDF" && git push)
